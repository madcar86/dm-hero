name: Test macOS Build

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture'
        required: true
        default: 'x64'
        type: choice
        options:
          - x64
          - arm64
          - both
      sign:
        description: 'Code Signing (requires secrets)'
        required: true
        default: true
        type: boolean

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ inputs.arch == 'both' && fromJSON('["x64", "arm64"]') || fromJSON(format('["{0}"]', inputs.arch)) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build Nuxt
        run: pnpm build
        working-directory: packages/app

      - name: Copy sharp native binaries to .output
        run: |
          cd packages/app
          # Find and copy @img/sharp-* packages (platform-specific binaries)
          mkdir -p .output/server/node_modules/@img

          # Find sharp darwin binaries in pnpm store
          for pkg in sharp-darwin-arm64 sharp-darwin-x64 sharp-libvips-darwin-arm64 sharp-libvips-darwin-x64; do
            src=$(find ../../node_modules/.pnpm -type d -name "$pkg" -path "*/@img/$pkg" 2>/dev/null | head -1)
            if [ -n "$src" ] && [ -d "$src" ]; then
              echo "Copying $pkg from $src"
              cp -r "$src" .output/server/node_modules/@img/
            fi
          done

          # Also check local node_modules
          if [ -d "node_modules/@img" ]; then
            cp -r node_modules/@img/* .output/server/node_modules/@img/ 2>/dev/null || true
          fi

          echo "=== @img contents ==="
          ls -la .output/server/node_modules/@img/ || echo "No @img folder"

      # Code Signing (only when enabled AND secrets are available)
      - name: Setup Code Signing
        if: inputs.sign
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "::warning::APPLE_CERTIFICATE secret not set, skipping signing"
            exit 0
          fi
          echo "SIGNING_ENABLED=true" >> $GITHUB_ENV
          echo "CSC_LINK=$CSC_LINK" >> $GITHUB_ENV
          echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD" >> $GITHUB_ENV

      - name: Rebuild native modules for Electron (${{ matrix.arch }})
        run: |
          cd packages/app
          npm_config_arch=${{ matrix.arch }} node scripts/electron-rebuild.js
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Build Electron (${{ matrix.arch }}) - Unsigned
        if: ${{ !inputs.sign || env.SIGNING_ENABLED != 'true' }}
        run: |
          cd packages/app
          pnpm electron-builder --mac --${{ matrix.arch }} --publish never --config.mac.identity=null --config.mac.hardenedRuntime=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Electron (${{ matrix.arch }}) - Signed
        if: inputs.sign && env.SIGNING_ENABLED == 'true'
        run: |
          cd packages/app
          pnpm electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: List build output
        run: |
          echo "=== Build Output ==="
          ls -la packages/app/dist-electron/ || echo "No dist-electron folder found"
          echo ""
          echo "=== DMG Files ==="
          find packages/app/dist-electron -name "*.dmg" 2>/dev/null || echo "No DMG files found"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dm-hero-mac-${{ matrix.arch }}-test
          path: packages/app/dist-electron/*.dmg
          retention-days: 7
          if-no-files-found: error
