name: Release App

on:
  push:
    branches:
      - main
    paths:
      - 'packages/app/package.json'
      - 'packages/app/CHANGELOG.md'
  workflow_dispatch:

# GLOBAL PERMISSIONS: Fixes the 'denied' errors for GHCR
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  # UPDATED: Changed from flo0806 to madcar86
  IMAGE_NAME: madcar86/dm-hero

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/app/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Check if release exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists - skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v${VERSION} does not exist - will create release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-docker-amd64:
    needs: check
    # Note: If testing for the first time on a fork, you can remove the 'if' condition 
    # or ensure your package.json version is higher than existing tags.
    if: needs.check.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          platforms: linux/amd64
          provenance: false

  build-docker-arm64:
    needs: check
    if: needs.check.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          platforms: linux/arm64
          provenance: false

  create-docker-manifest:
    needs: [check, build-docker-amd64, build-docker-arm64]
    if: always() && (needs.check.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker manifest create --amend ${IMAGE}:${VERSION} ${IMAGE}:${VERSION}-amd64 ${IMAGE}:${VERSION}-arm64
          docker manifest push ${IMAGE}:${VERSION}
          docker manifest create --amend ${IMAGE}:latest ${IMAGE}:${VERSION}-amd64 ${IMAGE}:${VERSION}-arm64
          docker manifest push ${IMAGE}:latest

# I have omitted the Electron builds to keep this focused on your Docker deployment.
